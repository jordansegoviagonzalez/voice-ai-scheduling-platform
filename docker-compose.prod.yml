services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [internal]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_ORIGIN: ${PUBLIC_APP_URL}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VOGENT_API_KEY: ${VOGENT_API_KEY:-}
      VOGENT_WEBHOOK_SECRET: ${VOGENT_WEBHOOK_SECRET:-}
      VOGENT_FUNCTION_SECRET: ${VOGENT_FUNCTION_SECRET:-}
      VOGENT_AGENT_ID: ${VOGENT_AGENT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_INTEGRATION_MODE: ${OPENAI_INTEGRATION_MODE:-live}
      ALLOW_OPENAI_TEST_MODE_IN_PRODUCTION: ${ALLOW_OPENAI_TEST_MODE_IN_PRODUCTION:-false}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-8}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-262144}
      JSON_STRING_FIELD_MAX_LENGTH: ${JSON_STRING_FIELD_MAX_LENGTH:-8192}
      RAW_USER_TEXT_MAX_LENGTH: ${RAW_USER_TEXT_MAX_LENGTH:-4000}
      TRANSCRIPT_TURN_MAX_LENGTH: ${TRANSCRIPT_TURN_MAX_LENGTH:-2000}
      TRANSCRIPT_TURN_MAX_COUNT: ${TRANSCRIPT_TURN_MAX_COUNT:-200}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-60}
    command: >-
      sh -c "alembic upgrade head && flask --app app:create_app seed &&
      exec gunicorn --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 60 app.wsgi:app"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
    expose:
      - "8000"
    networks: [internal]

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [internal, public]

volumes:
  postgres_data:

networks:
  internal:
    internal: true
  public:
